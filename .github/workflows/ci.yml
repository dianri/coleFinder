name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create secrets.defaults.properties
        run: |
          cat > secrets.defaults.properties << 'EOF'
          SUPABASE_URL_PRE=https://placeholder.supabase.co
          SUPABASE_ANON_KEY_PRE=placeholder-anon-key-pre
          SUPABASE_URL_PROD=https://placeholder.supabase.co
          SUPABASE_ANON_KEY_PROD=placeholder-anon-key-prod
          MAPS_API_KEY=placeholder-maps-key
          EOF

      - name: Run unit tests (pre flavor)
        run: ./gradlew :app:testPreDebugUnitTest --no-daemon --stacktrace

      - name: Run unit tests (prod flavor)
        run: ./gradlew :app:testProdDebugUnitTest --no-daemon --stacktrace

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            app/build/reports/tests/
            app/build/test-results/
          retention-days: 7

  build:
    name: Assemble Debug
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create secrets.defaults.properties
        run: |
          cat > secrets.defaults.properties << 'EOF'
          SUPABASE_URL_PRE=https://placeholder.supabase.co
          SUPABASE_ANON_KEY_PRE=placeholder-anon-key-pre
          SUPABASE_URL_PROD=https://placeholder.supabase.co
          SUPABASE_ANON_KEY_PROD=placeholder-anon-key-prod
          MAPS_API_KEY=placeholder-maps-key
          EOF

      - name: Assemble Pre Debug
        run: ./gradlew :app:assemblePreDebug --no-daemon

      - name: Assemble Prod Debug
        run: ./gradlew :app:assembleProdDebug --no-daemon

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: debug-apks
          path: app/build/outputs/apk/**/*.apk
          retention-days: 7
